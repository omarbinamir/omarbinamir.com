<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponseey | {{THEME_NAME}} Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: {{THEME_COLOR}};
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
            top: -200px;
            right: -200px;
        }

        .container { padding: 4rem 8%; }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }

        header { text-align: left; margin-bottom: 6rem; }
        .theme-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .icon { font-size: 3rem; }
        .badge { background: var(--accent); color: #000; padding: 0.2rem 1rem; border-radius: 20px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 6rem; margin: 0; line-height: 1; text-transform: uppercase; letter-spacing: -2px; }
        .description { font-size: 1.5rem; color: var(--text-dim); max-width: 700px; margin-top: 1rem; }

        /* Discovery Bar */
        .discovery-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.8rem 2rem;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

        /* Detailed Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-bottom: 6rem;
        }
        .site-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .site-card:hover { transform: translateY(-15px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .card-banner {
            width: 100%;
            height: 160px;
            background: rgba(255,255,255,0.05);
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border);
        }

        .card-body {
            padding: 2.5rem;
            flex-grow: 1;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
        .tier-tag { font-size: 0.7rem; font-weight: 800; padding: 0.4rem 1rem; border-radius: 30px; background: rgba(255,255,255,0.1); }
        .model-tag { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; color: var(--accent); }
        
        .site-card h3 { font-size: 1.8rem; margin: 0 0 0.5rem; font-family: 'Space Grotesk', sans-serif; }
        .site-card p { color: var(--text-dim); font-size: 1rem; margin-bottom: 2rem; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem; }
        .visit-link { font-weight: 700; color: var(--accent); font-size: 0.9rem; }

        /* Toolbox */
        .toolbox {
            background: linear-gradient(135deg, var(--glass), transparent);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 4rem;
            margin-top: 4rem;
        }
        .toolbox h2 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; margin-bottom: 2rem; }
        .tool-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .tool-item { display: flex; gap: 1rem; align-items: center; }
        .tool-icon { width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; }

        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            .container { padding: 2rem 5%; }
            .toolbox { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <nav>
            <a href="sponseey.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Return to Core
            </a>
            <div class="badge">Verified Hub</div>
        </nav>

        <header>
            <div class="theme-meta"><div class="badge">Sponseey Elite</div></div>
            <h1>{{THEME_NAME}}</h1>
            <p class="description">{{THEME_DESC}} Explore the most exclusive, manually vetted sites in the {{THEME_NAME}} sector.</p>
        </header>

        <!-- Discovery Bar -->
        <div class="discovery-bar">
            <button class="filter-btn active" onclick="filterSites('all', this)">All Sites</button>
            <button class="filter-btn" onclick="filterSites('Free', this)">Free</button>
            <button class="filter-btn" onclick="filterSites('Paid', this)">Paid</button>
            <button class="filter-btn" onclick="filterSites('Combined', this)">Combined</button>
        </div>

        <div class="grid" id="sitesGrid">
            <!-- Content dynamic -->
        </div>

        <div class="toolbox">
            <h2>The {{THEME_NAME}} Toolbox</h2>
            <div class="tool-list">
                <div class="tool-item"><div class="tool-icon">01</div><div><h4 style="margin:0">Analysis Bot</h4><small style="color:var(--text-dim)">Niche optimization</small></div></div>
                <div class="tool-item"><div class="tool-icon">02</div><div><h4 style="margin:0">Growth Kit</h4><small style="color:var(--text-dim)">Traffic scaling</small></div></div>
                <div class="tool-item"><div class="tool-icon">03</div><div><h4 style="margin:0">Elite Badge</h4><small style="color:var(--text-dim)">Verification</small></div></div>
            </div>
        </div>
    </div>

    <script>
        // Real Data Store (Empty for now)
        const categoryData = [];

        function filterSites(model, btn) {
            // Update active button
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            const grid = document.getElementById('sitesGrid');
            const filtered = model === 'all' ? categoryData : categoryData.filter(s => s.model === model);
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 5rem; border: 2px dashed var(--border); border-radius: 40px; color: var(--text-dim);">
                        <p style="font-size: 1.5rem; margin-bottom: 1rem;">No ${model === 'all' ? '' : model} sites currently in orbit.</p>
                        <p>Apply to be the first. <a href="sponseey.html#apply" style="color: var(--accent); text-decoration: none; font-weight: 700;">Join Check →</a></p>
                    </div>
                `;
                return;
            }

            renderSites(filtered);
        }

        function renderSites(data) {
            const grid = document.getElementById('sitesGrid');
            grid.innerHTML = '';
            data.forEach(site => {
                const card = document.createElement('a');
                card.href = site.url;
                card.className = 'site-card';
                card.innerHTML = `
                    ${site.banner ? `<div class="card-banner" style="background-image: url('${site.banner}')"></div>` : ''}
                    <div class="card-body">
                        <div class="card-header">
                            <span class="tier-tag">${site.tier}</span>
                            <span class="model-tag">${site.model}</span>
                        </div>
                        <h3>${site.name}</h3>
                        <p>${site.desc}</p>
                        <div class="card-footer">
                            <span class="visit-link">Enter Portal →</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initialize with 'all'
        filterSites('all');
    </script>
</body>
</html>
