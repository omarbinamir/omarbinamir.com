<!-- sponseey-fashion.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponseey | Fashion Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #ff9f43; --text: #ffffff; --text-dim: #a0a0a0; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; line-height: 1.6; }
        .glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(120px); opacity: 0.1; z-index: -1; top: -200px; right: -200px; }
        .container { padding: 4rem 8%; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem; }
        .back-btn { display: flex; align-items: center; gap: 0.5rem; color: var(--text); text-decoration: none; font-weight: 600; padding: 0.8rem 1.5rem; background: var(--glass); border: 1px solid var(--border); border-radius: 50px; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
        header { text-align: left; margin-bottom: 6rem; }
        .theme-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .icon { font-size: 3rem; }
        .badge { background: var(--accent); color: #000; padding: 0.2rem 1rem; border-radius: 20px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 6rem; margin: 0; line-height: 1; text-transform: uppercase; letter-spacing: -2px; }
        .description { font-size: 1.5rem; color: var(--text-dim); max-width: 700px; margin-top: 1rem; }
        .discovery-bar { display: flex; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.8rem 2rem; background: var(--glass); border: 1px solid var(--border); color: var(--text); border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2.5rem; margin-bottom: 6rem; }
        .site-card { background: var(--glass); border: 1px solid var(--border); border-radius: 32px; padding: 0; transition: all 0.4s; position: relative; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .site-card:hover { transform: translateY(-15px); border-color: var(--accent); }
        .card-banner { width: 100%; height: 140px; background: rgba(255,255,255,0.05); background-size: cover; background-position: center; border-bottom: 1px solid var(--border); }
        .card-body { padding: 2rem; flex-grow: 1; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <nav><a href="sponseey.html" class="back-btn">Return to Core</a><div class="badge">Verified Fashion Hub</div></nav>
        <header>
            <div class="theme-meta"><div class="badge">Sponseey Elite</div></div>
            <h1>Fashion</h1>
            <p class="description">Couture in the digital age. Explore the most exclusive, manually vetted sites in the Fashion sector.</p>
        </header>
        <div class="discovery-bar">
            <button class="filter-btn active" onclick="filterSites('all', this)">All Sites</button>
            <button class="filter-btn" onclick="filterSites('Free', this)">Free</button>
            <button class="filter-btn" onclick="filterSites('Paid', this)">Paid</button>
            <button class="filter-btn" onclick="filterSites('Combined', this)">Combined</button>
        </div>
        <div class="grid" id="sitesGrid"></div>
    </div>
    <script>
        const categoryData = [];
        function filterSites(model, btn) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            const grid = document.getElementById('sitesGrid');
            const filtered = model === 'all' ? categoryData : categoryData.filter(s => s.model === model);
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 5rem; border: 2px dashed var(--border); border-radius: 40px; color: var(--text-dim);"><p style="font-size: 1.5rem; margin-bottom: 1rem;">No ${model === 'all' ? '' : model} sites currently in orbit.</p><p>Apply to be the first. <a href="sponseey.html#apply" style="color: var(--accent); text-decoration: none; font-weight: 700;">Join Check →</a></p></div>`;
                return;
            }
            renderSites(filtered);
        }
        function renderSites(data) {
            const grid = document.getElementById('sitesGrid');
            grid.innerHTML = '';
            data.forEach(site => {
                const card = document.createElement('a');
                card.href = site.url;
                card.className = 'site-card';
                card.innerHTML = `
                    ${site.banner ? `<div class="card-banner" style="background-image: url('${site.banner}')"></div>` : ''}
                    <div class="card-body">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                            <span style="font-size:0.7rem; font-weight:800; padding:0.3rem 0.8rem; background:rgba(255,255,255,0.1); border-radius:20px;">${site.tier}</span>
                            <span style="font-size:0.6rem; color:var(--accent); font-weight:700; text-transform:uppercase;">${site.model}</span>
                        </div>
                        <h3>${site.name}</h3>
                        <p>${site.desc}</p>
                        <div style="border-top:1px solid var(--border); padding-top:1rem; margin-top:1rem;">
                            <span style="color:var(--accent); font-weight:700; font-size:0.9rem;">Enter Portal →</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        filterSites('all');
    </script>
</body>
</html>
